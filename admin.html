<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel — IKCADIN TOUR 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#050C1A;--card:#0A1830;--card2:#0D1E3F;
  --border:rgba(26,45,90,.6);--p:#1B3A8C;--a:#D4AF37;
  --text:#E8EAF2;--muted:rgba(232,234,242,.45);
  --r:12px;--r2:8px;--header-h:58px;--sidebar-w:220px;
  --danger:#EF4444;--success:#10B981;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

/* ── LOGIN ─────────────────────────────────────────────────── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(27,58,140,.18) 0%,transparent 70%)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-icon{font-size:2.4rem;margin-bottom:10px}
.login-title{font-size:1.15rem;font-weight:700;color:var(--a);margin-bottom:3px}
.login-sub{font-size:.78rem;color:var(--muted);margin-bottom:28px}
.login-input{width:100%;padding:12px 14px;background:var(--dark);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:.95rem;margin-bottom:12px;transition:border-color .15s}
.login-input:focus{outline:none;border-color:var(--a)}
.login-pw-wrap{position:relative}
.login-pw-wrap .login-input{padding-right:44px}
.login-pw-toggle{
  position:absolute;top:12px;right:8px;
  width:30px;height:30px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);cursor:pointer;border-radius:8px;transition:.15s;padding:0;
}
.login-pw-toggle:hover{color:var(--a);background:rgba(212,175,55,.1)}
.login-pw-toggle svg{width:18px;height:18px}
.btn-primary{width:100%;padding:12px;background:var(--p);border:none;border-radius:var(--r2);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary:hover{background:#2547B0}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:#fca5a5;font-size:.8rem;margin-top:10px;display:none}

/* ── APP LAYOUT ─────────────────────────────────────────────── */
#adminApp{display:none;flex-direction:column;min-height:100vh}

.admin-header{
  position:sticky;top:0;z-index:100;height:var(--header-h);
  background:rgba(5,12,26,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.sidebar-toggle{display:none;padding:6px 10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:1rem}
.admin-header-brand{flex:1;font-size:.95rem;font-weight:700}
.admin-header-brand span{color:var(--a)}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.78rem;cursor:pointer;transition:.2s}
.btn-logout:hover{border-color:var(--danger);color:#fca5a5}

.admin-body{display:flex;flex:1}

/* Sidebar */
.admin-sidebar{
  width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);
  padding:14px 8px;position:sticky;top:var(--header-h);
  height:calc(100vh - var(--header-h));overflow-y:auto;flex-shrink:0;
}
.sb-label{font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:4px 12px 8px}
.sb-btn{
  display:block;width:100%;text-align:left;padding:9px 14px;background:transparent;
  border:none;border-radius:var(--r2);color:var(--text);font-size:.83rem;cursor:pointer;
  transition:.12s;margin-bottom:2px;
}
.sb-btn:hover{background:rgba(255,255,255,.05)}
.sb-btn.active{background:rgba(27,58,140,.3);color:var(--a);font-weight:600;border-left:3px solid var(--a);padding-left:11px}

/* Main */
.admin-main{flex:1;padding:24px;overflow-x:hidden;overflow-y:auto;height:calc(100vh - var(--header-h));min-width:0}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.sec-title{font-size:1.05rem;font-weight:700;color:var(--a)}
.btn-add{padding:8px 18px;background:var(--p);border:none;border-radius:var(--r2);color:#fff;font-size:.83rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-add:hover{background:#2547B0}

.info-note{background:rgba(27,58,140,.12);border:1px solid rgba(27,58,140,.28);border-radius:var(--r2);padding:9px 14px;font-size:.77rem;color:var(--muted);margin-bottom:14px;line-height:1.55}
.info-note strong{color:#9ab0ff}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead tr{background:rgba(27,58,140,.15)}
th{padding:10px 12px;text-align:left;font-weight:700;color:var(--a);white-space:nowrap;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 12px;border-top:1px solid var(--border);vertical-align:middle;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.02)}
.tbl-loading,.tbl-empty{text-align:center;padding:48px;color:var(--muted);font-size:.88rem}
.tbl-actions{display:flex;gap:6px;white-space:nowrap}
.btn-edit{padding:3px 10px;background:rgba(27,58,140,.22);border:1px solid rgba(27,58,140,.4);border-radius:5px;color:#9ab0ff;font-size:.73rem;cursor:pointer;transition:.12s}
.btn-edit:hover{background:rgba(27,58,140,.45)}
.btn-del{padding:3px 10px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);border-radius:5px;color:#fca5a5;font-size:.73rem;cursor:pointer;transition:.12s}
.btn-del:hover{background:rgba(239,68,68,.28)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:560px;animation:fadeUp .2s ease both;margin:auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--card2);border-radius:var(--r) var(--r) 0 0}
.modal-head-title{font-size:.9rem;font-weight:700;color:var(--a)}
.modal-x{background:none;border:none;color:var(--muted);font-size:1.25rem;cursor:pointer;padding:0 2px;line-height:1}
.modal-x:hover{color:var(--text)}
.modal-body{padding:20px;max-height:calc(85vh - 130px);overflow-y:auto}
.form-grp{margin-bottom:14px}
.form-lbl{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.form-inp,.form-ta{width:100%;padding:9px 12px;background:var(--dark);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:.86rem;font-family:inherit;transition:border-color .15s}
.form-inp:focus,.form-ta:focus{outline:none;border-color:var(--a)}
.form-ta{resize:vertical;min-height:80px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border)}
.btn-cancel{padding:8px 18px;background:transparent;border:1px solid var(--border);border-radius:var(--r2);color:var(--muted);font-size:.83rem;cursor:pointer;transition:.15s}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-save{padding:8px 18px;background:var(--p);border:none;border-radius:var(--r2);color:#fff;font-size:.83rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-save:hover{background:#2547B0}
.btn-save:disabled{opacity:.45;cursor:not-allowed}

/* Toast */
.toast{position:fixed;bottom:24px;right:20px;z-index:400;padding:12px 18px;border-radius:var(--r2);font-size:.82rem;font-weight:600;background:var(--card2);border:1px solid var(--border);max-width:300px;animation:fadeUp .2s ease both}
.toast.ok{border-color:var(--success);color:var(--success)}
.toast.err{border-color:var(--danger);color:#fca5a5}

/* Row count badge */
.row-count{font-size:.75rem;color:var(--muted);background:rgba(27,58,140,.15);border:1px solid var(--border);border-radius:999px;padding:2px 10px}

/* Mobile */
@media(max-width:768px){
  .sidebar-toggle{display:block}
  .admin-sidebar{position:fixed;top:var(--header-h);left:-260px;width:260px;z-index:99;transition:left .3s;height:calc(100dvh - var(--header-h))}
  .admin-sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.5)}
  .admin-main{padding:14px;height:calc(100dvh - var(--header-h))}
  .rk-controls{margin-left:-14px;margin-right:-14px;padding-left:14px;padding-right:14px}
  .sec-header{flex-direction:column;align-items:flex-start}
}

/* ── REKAP CLAIM ─────────────────────────────────────────────── */
.rekap-stats { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px; }
@media(max-width:520px){.rekap-stats{grid-template-columns:1fr;}}
.rekap-stat-card {
  background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;
}
.rekap-stat-label { font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px; }
.rekap-stat-num   { font-size:1.6rem;font-weight:800;line-height:1; }
.rekap-stat-num span { font-size:.9rem;font-weight:400;color:var(--muted); }
.rekap-stat-bar   { height:5px;background:var(--border);border-radius:3px;margin:8px 0 4px; }
.rekap-stat-fill  { height:100%;border-radius:3px;transition:.4s; }
.rekap-stat-pct   { font-size:.72rem;color:var(--muted); }
.rekap-badge { display:inline-flex;align-items:center;gap:4px;font-size:.73rem;padding:3px 8px;border-radius:20px;white-space:nowrap; }
.rekap-yes  { background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25); }
.rekap-no   { background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.2); }
.rekap-row-done td { opacity:.65; }
.rekap-stat-card.rk-selectable { cursor:pointer;transition:.15s;border:1px solid transparent; }
.rekap-stat-card.rk-selectable:hover { border-color:var(--border); }
.rekap-stat-card.rk-active { border-color:var(--a);box-shadow:0 0 0 2px rgba(212,175,55,.18); }

/* ── Rekap: kontrol + daftar peserta (mobile friendly) ── */
.rk-controls {
  position:sticky;top:0;z-index:90;
  margin:18px -24px 0;padding:12px 24px;
  background:var(--dark);border-bottom:1px solid var(--border);
  box-shadow:0 6px 14px rgba(0,0,0,.35);
}
@media(max-width:768px){ .rk-controls{ margin-left:-14px;margin-right:-14px;padding-left:14px;padding-right:14px; } }
.rk-tabs { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px; }
.rk-tab {
  padding:10px 8px;border-radius:var(--r2);border:1px solid var(--border);
  background:var(--dark);color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:700;
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s;
}
.rk-tab small { display:block;font-size:.68rem;font-weight:600;opacity:.8;margin-top:2px; }
.rk-tab.active-snack       { background:rgba(212,175,55,.16);border-color:#D4AF37;color:#D4AF37; }
.rk-tab.active-makan_siang { background:rgba(34,197,94,.14);border-color:#22c55e;color:#22c55e; }
.rk-tab.active-makan_malam { background:rgba(168,85,247,.14);border-color:#a855f7;color:#a855f7; }
.rk-row2 { display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
.rk-search { flex:1;min-width:140px;padding:9px 12px;background:var(--dark);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:.85rem;outline:none; }
.rk-search:focus { border-color:var(--a); }
.rk-chips { display:flex;gap:6px; }
.rk-chip { padding:8px 13px;border-radius:20px;border:1px solid var(--border);background:var(--dark);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:700;transition:.15s; }
.rk-chip.active { background:var(--p);border-color:var(--p);color:#fff; }
.rk-summary { font-size:.82rem;color:var(--muted);margin:6px 2px 12px; }
.rk-summary strong { color:var(--text); }
.rk-list { display:flex;flex-direction:column;gap:8px; }
.rk-item {
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:var(--r2);
  background:var(--card2);border:1px solid var(--border);border-left-width:4px;
}
.rk-item.done   { border-left-color:#22c55e; }
.rk-item.undone { border-left-color:#ef4444; }
.rk-item-main { flex:1;min-width:0; }
.rk-item-name { font-size:.92rem;font-weight:700;color:var(--text); }
.rk-item-sub  { font-size:.74rem;color:var(--muted);margin-top:2px; }
.rk-item-st { flex-shrink:0;text-align:right; }
.rk-st-badge { display:inline-flex;align-items:center;gap:4px;font-size:.74rem;font-weight:700;padding:4px 10px;border-radius:14px;white-space:nowrap; }
.rk-st-badge.yes { background:rgba(34,197,94,.14);color:#22c55e; }
.rk-st-badge.no  { background:rgba(239,68,68,.1);color:#ef4444; }
.rk-st-time { font-size:.66rem;color:var(--muted);margin-top:3px; }
.rk-empty { text-align:center;color:var(--muted);padding:24px;font-size:.85rem; }

/* ── Data Claim: kartu rapi ── */
.cd-controls{position:sticky;top:0;z-index:90;margin:0 -24px 14px;padding:12px 24px;background:var(--dark);border-bottom:1px solid var(--border);box-shadow:0 6px 14px rgba(0,0,0,.25)}
@media(max-width:768px){.cd-controls{margin-left:-14px;margin-right:-14px;padding-left:14px;padding-right:14px}}
.cd-count{font-size:.78rem;color:var(--muted);margin:0 2px 12px}
.cd-count strong{color:var(--text)}
.cd-list{display:flex;flex-direction:column;gap:10px}
.cd-card{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--r2);background:var(--card2);border:1px solid var(--border)}
.cd-main{flex:1;min-width:0}
.cd-name{font-size:.95rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cd-ini{font-size:.64rem;font-weight:700;letter-spacing:.08em;color:var(--a);background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);padding:2px 7px;border-radius:6px}
.cd-sub{font-size:.75rem;color:var(--muted);margin:3px 0 9px}
.cd-meals{display:flex;flex-wrap:wrap;gap:6px}
.cd-chip{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:700;padding:4px 9px;border-radius:12px;white-space:nowrap}
.cd-chip.yes{background:rgba(34,197,94,.14);color:#22c55e}
.cd-chip.no{background:rgba(100,116,139,.16);color:var(--muted)}
.cd-chip svg{width:.72rem;height:.72rem}
.cd-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.cd-actions .btn-edit,.cd-actions .btn-del{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px}

/* ── CLAIM PANEL ─────────────────────────────────────────────── */
.claim-panel { max-width:540px;margin:0 auto; }
.claim-panel-title { font-size:1.05rem;font-weight:800;color:var(--a);margin-bottom:18px; }
.claim-meal-row {
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;margin-bottom:20px;
}
.meal-btn {
  width:100%;min-width:0;padding:11px 8px;border-radius:var(--r2);
  border:1px solid var(--border);background:var(--dark);color:var(--muted);
  cursor:pointer;font-size:.8rem;font-weight:700;transition:.15s;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.meal-btn:hover { border-color:var(--a);color:var(--a); }
.meal-btn.active-snack       { background:rgba(212,175,55,.18);border-color:#D4AF37;color:#D4AF37; }
.meal-btn.active-makan_siang { background:rgba(34,197,94,.15);border-color:#22c55e;color:#22c55e; }
.meal-btn.active-makan_malam { background:rgba(168,85,247,.15);border-color:#a855f7;color:#a855f7; }
.meal-btn.active-none        { background:rgba(239,68,68,.12);border-color:#ef4444;color:#ef4444; }
.meal-btn-tutup { }
@media (min-width:480px) { .claim-meal-row { grid-template-columns:repeat(4,minmax(0,1fr)); } }

/* Loading / progress saat verifikasi scan */
.claim-loading { display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 10px;text-align:center; }
.claim-spinner {
  width:42px;height:42px;border-radius:50%;
  border:4px solid var(--border);border-top-color:var(--a);
  animation:claimSpin .8s linear infinite;
}
@keyframes claimSpin { to { transform:rotate(360deg); } }
.claim-loading-txt { font-size:.86rem;color:var(--muted); }
.claim-loading-txt strong { color:var(--text); }

.claim-scanner-box {
  background:var(--card2);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;margin-bottom:16px;
}
.claim-scanner-label { font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px; }
#claimVideo { width:100%;max-height:260px;border-radius:var(--r2);display:none;background:#000; }
.claim-scan-btns { display:flex;gap:8px;margin-top:10px;flex-wrap:wrap; }
.btn-scan-start { padding:9px 18px;background:var(--p);border:none;border-radius:var(--r2);color:#fff;font-size:.83rem;font-weight:600;cursor:pointer;transition:.2s; }
.btn-scan-start:hover { background:#2547B0; }
.btn-scan-stop  { padding:9px 18px;background:transparent;border:1px solid var(--border);border-radius:var(--r2);color:var(--muted);font-size:.83rem;cursor:pointer;transition:.2s; }
.btn-scan-stop:hover { border-color:#ef4444;color:#fca5a5; }
.claim-scan-status { font-size:.75rem;color:var(--muted);margin-top:8px; }

.claim-manual-row { display:flex;gap:8px;margin-top:12px; }
.claim-manual-input { flex:1;padding:9px 12px;background:var(--dark);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:.86rem;outline:none; }
.claim-manual-input:focus { border-color:var(--a); }
.btn-manual-check { padding:9px 16px;background:var(--p);border:none;border-radius:var(--r2);color:#fff;font-size:.83rem;font-weight:600;cursor:pointer; }

.claim-result-box {
  background:var(--card2);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;display:none;
}
.claim-result-box.show { display:block;animation:fadeUp .25s ease both; }
.cres-head  { display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px; }
.cres-id    { min-width:0; }
.cres-name  { font-size:1.6rem;font-weight:800;color:var(--text);line-height:1.1;margin-bottom:3px;word-break:break-word; }
.cres-dept  { font-size:.9rem;color:var(--p,#1b3a8c);font-weight:600; }
html[data-theme="light"] .cres-dept { color:var(--p,#1b3a8c); }
.cres-pax   {
  flex-shrink:0;display:flex;align-items:baseline;gap:5px;
  background:linear-gradient(135deg,var(--a),#B8941F);color:#fff;
  font-size:2rem;font-weight:800;line-height:1;
  padding:16px 22px;border-radius:14px;box-shadow:0 4px 16px rgba(212,175,55,.35);
}
.cres-pax span { font-size:1.15rem;font-weight:800; }
.cres-meal  { font-size:.92rem;font-weight:700;margin-bottom:12px;color:var(--text); }
.cres-status-already {
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--r2);color:#fca5a5;font-size:.83rem;margin-bottom:12px;
}
.cres-status-ok {
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);
  border-radius:var(--r2);color:#22c55e;font-size:.83rem;margin-bottom:12px;
}
.btn-claim-confirm {
  width:100%;padding:12px;background:var(--success);border:none;
  border-radius:var(--r2);color:#fff;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:.2s;
}
.btn-claim-confirm:hover { background:#0e9f6e; }
.btn-claim-confirm:disabled { opacity:.45;cursor:not-allowed; }
.btn-scan-again { width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:var(--r2);color:var(--muted);font-size:.83rem;cursor:pointer;margin-top:8px;transition:.15s; }
.btn-scan-again:hover { border-color:var(--text);color:var(--text); }

/* Kartu kamar (verifikasi kunci) */
.key-pic-head { font-size:1.25rem;font-weight:800;color:var(--text);margin-bottom:2px; }
.key-pic-sub  { font-size:.8rem;color:var(--muted);margin-bottom:14px; }
.key-room-card { background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;margin-bottom:10px; }
.key-room-head { display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px; }
.key-room-num { font-size:1.05rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:7px; }
.key-room-type { font-size:.68rem;font-weight:700;color:var(--a);background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);padding:3px 9px;border-radius:20px; }
.key-occ-title { font-size:.64rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px; }
.key-occ-list { display:flex;flex-direction:column;gap:4px;margin-bottom:9px; }
.key-occ { display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text); }
.key-occ-kode { font-size:.64rem;font-weight:700;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;min-width:30px;text-align:center; }
.key-room-status { display:flex;align-items:center;gap:6px;font-size:.76rem;font-weight:700;padding:7px 11px;border-radius:var(--r2);justify-content:center; }
.key-room-status.taken { background:rgba(34,197,94,.12);color:#22c55e; }
.key-room-status.waiting { background:rgba(100,116,139,.14);color:var(--muted); }

/* ── Theme toggle button ── */
.theme-toggle{width:34px;height:34px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.theme-toggle:hover{color:var(--a);border-color:var(--a)}
.theme-toggle svg{width:17px;height:17px}

/* ── LIGHT MODE ───────────────────────────────────────────────── */
html[data-theme="light"]{
  --dark:#EEF1F8;--card:#FFFFFF;--card2:#F7F9FC;
  --border:#D7DEEC;--text:#0F1E3D;--muted:#5A6E96;--a:#9A6E00;
}
html[data-theme="light"] body{background:var(--dark)}

html[data-theme="light"] .theme-toggle{background:#F0F2F7}
html[data-theme="light"] .sb-btn:hover{background:#EEF1F9}
html[data-theme="light"] .sb-btn.active{background:rgba(27,58,140,.1)}
html[data-theme="light"] thead tr{background:#EDF1FA}

html[data-theme="light"] .rekap-stat-num[style*="D4AF37"]{color:#9A6E00 !important}
html[data-theme="light"] .toast.ok{color:#0a7d52}
</style>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw4VnfSKfmedwxQDisbvmCMVjhOJL4q5srfHI3NHbwdPBKHU3cieCzmFTONXVBP7V_b/exec';

function svgIcon(id, size) {
  var s = size || '1rem';
  return '<svg style="width:'+s+';height:'+s+';display:inline-block;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#icon-'+id+'"/></svg>';
}

const SECTIONS = [
  { key:'pengumuman', icon:'megaphone', label:'Pengumuman',     sheet:'Pengumuman'      },
  { key:'panitia',    icon:'crown',     label:'Panitia',         sheet:'Panitia'         },
  { key:'kontak',     icon:'phone',     label:'Kontak',          sheet:'Kontak'          },
  { key:'rules',      icon:'clipboard', label:'Rules',           sheet:'Rules'           },
  { key:'rundown',    icon:'calendar',  label:'Rundown',          sheet:'Rundown'         },
  { key:'bus',        icon:'bus',       label:'List Bus',         sheet:'List Bus'        },
  { key:'mobil',      icon:'car',       label:'Mobil Pribadi',    sheet:'Mobil Pribadi'   },
  { key:'custom',     icon:'sparkles',  label:'Custom Sections',  sheet:'Custom Sections' },
  { key:'config',     icon:'settings',  label:'Config',           sheet:'Config'          },
  { key:'hadiah',     icon:'gift',      label:'Hadiah',           sheet:'Hadiah'          },
  { key:'claim_data',  icon:'clipboard', label:'Data Claim',        sheet:'Claim'           },
  { key:'claim_rekap', icon:'chart',     label:'Rekap Claim',       sheet:'Claim'           },
  { key:'claim_scan',  icon:'ticket',    label:'Verifikasi Claim',  sheet:null              },
  { key:'key_scan',    icon:'home',      label:'Verifikasi Kunci',  sheet:null              },
];

// ── STATE ────────────────────────────────────────────────────────
let token = '';
let curSection = null;
let curHeaders = [];
let curRows    = [];
let editingIdx = null; // null=add, number=edit

// ── LONG TEXT COLUMNS (pakai textarea) ──────────────────────────
const LONG_KEYS = ['keterangan','konten','isi','deskripsi','catatan','detail','alamat','pesan','note'];

// ── LOGIN ────────────────────────────────────────────────────────
function togglePwPeek() {
  var inp = document.getElementById('loginPw');
  var btn = document.getElementById('loginPwToggle');
  if (!inp) return;
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  if (btn) {
    btn.setAttribute('aria-label', show ? 'Sembunyikan password' : 'Tampilkan password');
    btn.setAttribute('title', show ? 'Sembunyikan password' : 'Tampilkan password');
    btn.innerHTML = show
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 11s3.5 7 10 7a9.12 9.12 0 0 0 5.39-1.61"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/><line x1="2" y1="2" x2="22" y2="22"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
  inp.focus();
}

function doLogin() {
  const pw = document.getElementById('loginPw').value.trim();
  if (!pw) return;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true; btn.textContent = 'Memeriksa…';
  err.style.display = 'none';
  postGAS({ action:'ping', token:pw })
    .then(r => {
      if (r.ok) {
        token = pw;
        sessionStorage.setItem('adm', pw);
        showApp();
      } else {
        err.style.display = 'block';
      }
    })
    .catch(() => { err.textContent = 'Gagal koneksi ke server.'; err.style.display = 'block'; })
    .finally(() => { btn.disabled = false; btn.textContent = 'Masuk'; });
}

function doLogout() {
  token = ''; sessionStorage.removeItem('adm');
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPw').value = '';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'flex';
  buildSidebar();
  // Default section aktif saat masuk: Verifikasi Claim
  loadSection('claim_scan');
}

// ── THEME ─────────────────────────────────────────────────────
var SUN_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
var MOON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
function applyAdminTheme(t) {
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  var btn = document.getElementById('themeToggleAdmin');
  if (btn) btn.innerHTML = (t === 'light') ? MOON_SVG : SUN_SVG;
}
function toggleAdminTheme() {
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  var next = isLight ? 'dark' : 'light';
  try { localStorage.setItem('admTheme', next); } catch(e) {}
  applyAdminTheme(next);
}

window.addEventListener('DOMContentLoaded', function() {
  applyAdminTheme(localStorage.getItem('admTheme') || 'dark');
  const saved = sessionStorage.getItem('adm');
  if (saved) { token = saved; showApp(); }
  document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

// ── SIDEBAR ──────────────────────────────────────────────────────
function buildSidebar() {
  // Urutan Claim Konsumsi: Verifikasi Claim → Rekap Claim → Data Claim
  const claimOrder = ['claim_scan','claim_rekap','claim_data'];
  const keyOrder   = ['key_scan'];
  const dataSecs   = SECTIONS.filter(s => !claimOrder.includes(s.key) && !keyOrder.includes(s.key));
  const claimSecs  = claimOrder.map(k => SECTIONS.find(s => s.key === k)).filter(Boolean);
  const keySecs    = keyOrder.map(k => SECTIONS.find(s => s.key === k)).filter(Boolean);
  document.getElementById('adminSidebar').innerHTML =
    '<div class="sb-label">Claim Konsumsi</div>' +
    claimSecs.map(s =>

// ── LOAD SECTION ─────────────────────────────────────────────────
function loadSection(key) {
  stopClaimScan();
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  if (window.innerWidth <= 768) document.getElementById('adminSidebar').classList.remove('open');

  // ── CLAIM VERIFIKASI (custom panel) ──────────────────────────
  if (key === 'claim_scan') {
    curSection = SECTIONS.find(s => s.key === key);
    scanHandler = processScannedQR;
    document.getElementById('adminMain').innerHTML = renderClaimPanel();
    loadActiveMeal();
    loadAdmClaimList();
    return;
  }

  // ── VERIFIKASI KUNCI KAMAR ───────────────────────────────────
  if (key === 'key_scan') {
    curSection = SECTIONS.find(s => s.key === key);
    scanHandler = processKeyQR;
    document.getElementById('adminMain').innerHTML = renderKeyPanel();
    return;
  }

  // ── DATA CLAIM (kartu rapi + cari) ───────────────────────────
  if (key === 'claim_data') {
    curSection = SECTIONS.find(s => s.key === key);
    cdSearch = '';
    document.getElementById('adminMain').innerHTML =
      '<div class="sec-header"><div class="sec-title">Data Claim</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn-add" onclick="openAdd()">+ Tambah</button>' +
        '<button class="btn-logout" onclick="fetchData()">↻ Refresh</button>' +
      '</div></div>' +
      '<div class="cd-controls"><input class="rk-search" id="cdSearch" placeholder="Cari nama / inisial / departemen…" oninput="onCdSearch(this.value)"></div>' +
      '<div id="cdArea"><div class="tbl-loading">⏳ Memuat…</div></div>';
    fetchData();
    return;
  }

  // ── REKAP CLAIM ───────────────────────────────────────────────
  if (key === 'claim_rekap') {
    curSection = SECTIONS.find(s => s.key === key);
    document.getElementById('adminMain').innerHTML =
      '<div class="sec-header"><div class="sec-title">Rekap Claim Konsumsi</div>' +
      '<button class="btn-add" onclick="loadRekapClaim()">↻ Refresh</button></div>' +
      '<div id="rekapArea"><div class="tbl-loading">⏳ Memuat…</div></div>';
    loadRekapClaim();
    return;
  }

  curSection = SECTIONS.find(s => s.key === key);
  if (!curSection) return;
  document.getElementById('adminMain').innerHTML = `
    <div class="sec-header">
      <div>
        <div class="sec-title">${curSection.label}</div>
      </div>
      <button class="btn-add" onclick="openAdd()">+ Tambah Baris</button>
    </div>
    <div class="info-note">Sheet: <strong>${curSection.sheet}</strong> — Edit langsung tersimpan ke Google Sheets. Cache otomatis diperbarui.</div>
    <div id="tblArea"><div class="tbl-loading">⏳ Memuat…</div></div>`;
  fetchData();
}

function fetchData() {
  postGAS({ action:'get_admin_data', token, sheet: curSection.sheet })
    .then(r => {
      if (!r.ok) { toast('Gagal memuat: ' + (r.error||'?'), 'err'); return; }
      curHeaders = r.headers;
      curRows    = r.rows;
      if (curSection.key === 'claim_data') renderClaimDataCards();
      else renderTable();
    })
    .catch(e => toast('Error: ' + e.message, 'err'));
}

function openAdd() {
  editingIdx = null;
  document.getElementById('modalTitle').textContent = `Tambah — ${curSection.label}`;
  buildForm(curHeaders, curHeaders.map(() => ''));
  document.getElementById('modalBg').classList.add('open');
}

function openEdit(rowIndex) {
  editingIdx = rowIndex;
  const row = curRows.find(r => r.rowIndex === rowIndex);
  if (!row) return;
  document.getElementById('modalTitle').textContent = `Edit baris #${rowIndex} — ${curSection.label}`;
  buildForm(curHeaders, row.data);
  document.getElementById('modalBg').classList.add('open');
}

function buildForm(headers, values) {
  document.getElementById('modalBody').innerHTML = headers.map((h, i) => {
    const v   = esc(values[i] || '');
    const key = h.toLowerCase();
    const isLong = LONG_KEYS.some(k => key.includes(k));
    return `<div class="form-grp">
      <label class="form-lbl">${esc(h)}</label>
      ${isLong
        ? `<textarea class="form-ta" name="f${i}">${v}</textarea>`
        : `<input  class="form-inp" name="f${i}" type="text" value="${v}">`
      }
    </div>`;
  }).join('');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function submitForm() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = 'Menyimpan…';
  const data = curHeaders.map((_, i) => {
    const el = document.querySelector(`[name="f${i}"]`);
    return el ? el.value : '';
  });
  const payload = editingIdx === null
    ? { action:'create', token, sheet: curSection.sheet, data }
    : { action:'update', token, sheet: curSection.sheet, rowIndex: editingIdx, data };
  postGAS(payload)
    .then(r => {
      btn.disabled = false; btn.textContent = 'Simpan';
      if (r.ok) {
        closeModal();
        toast(editingIdx ? 'Baris berhasil diperbarui ✓' : 'Baris baru ditambahkan ✓', 'ok');
        fetchData();
      } else {
        toast('Gagal: ' + (r.error||'?'), 'err');
      }
    })
    .catch(e => { btn.disabled = false; btn.textContent = 'Simpan'; toast('Error: ' + e.message, 'err'); });
}

function delRow(rowIndex) {
  if (!confirm('Hapus baris ini dari Google Sheets?\n\nTindakan tidak bisa dibatalkan.')) return;
  postGAS({ action:'delete', token, sheet: curSection.sheet, rowIndex })
    .then(r => {
      if (r.ok) { toast('Baris dihapus ✓', 'ok'); fetchData(); }
      else toast('Gagal hapus: ' + (r.error||'?'), 'err');
    })
    .catch(e => toast('Error: ' + e.message, 'err'));
}

// ── HELPERS ───────────────────────────────────────────────────────
function postGAS(payload) {
  return fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // text/plain menghindari CORS preflight
    body: JSON.stringify(payload),
    redirect: 'follow'
  }).then(r => r.json());
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _tTimer;
function toast(msg, type) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  clearTimeout(_tTimer);
  const el = Object.assign(document.createElement('div'), { className:'toast '+(type||''), textContent:msg });
  document.body.appendChild(el);
  _tTimer = setTimeout(() => el.remove(), 3800);
}

// Tutup modal jika klik di luar
document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// State rekap
var rekapRows  = [];
var rekapMeal  = 'snack';   // sesi yang sedang ditampilkan di daftar
var rekapFilter = 'all';    // all | yes | no
var rekapSearch = '';
var REKAP_COL  = { snack:4, makan_siang:5, makan_malam:6 };
var REKAP_LABEL = { snack:'Snack', makan_siang:'Makan Siang', makan_malam:'Makan Malam' };

function renderRekap(headers, rows, area) {
  // Kolom: Nama(0), Inisial(1), Dept(2), Pax(3), Snack(4), MakanSiang(5), MakanMalam(6)
  rekapRows = rows;
  var total = rows.length;
  var c = { snack:0, makan_siang:0, makan_malam:0 };
  rows.forEach(function(row) {
    if (row.data[4]) c.snack++;
    if (row.data[5]) c.makan_siang++;
    if (row.data[6]) c.makan_malam++;
  });

  // Default sesi = sesi aktif jika valid, kalau tidak Snack
  if (['snack','makan_siang','makan_malam'].indexOf(claimActiveMeal) !== -1) rekapMeal = claimActiveMeal;

  function statCard(meal, label, color) {
    var claimed = c[meal];
    var pct = total ? Math.round(claimed/total*100) : 0;
    return '<div class="rekap-stat-card rk-selectable' + (meal===rekapMeal?' rk-active':'') + '" onclick="setRekapMeal(\'' + meal + '\')">' +
      '<div class="rekap-stat-label">' + label + '</div>' +
      '<div class="rekap-stat-num" style="color:' + color + '">' + claimed + '<span>/' + total + '</span></div>' +
      '<div class="rekap-stat-bar"><div class="rekap-stat-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<div class="rekap-stat-pct">' + pct + '% sudah ambil</div>' +
      '</div>';
  }

  var statsHtml =
    '<div class="rekap-stats">' +
    statCard('snack',       'Snack',       '#D4AF37') +
    statCard('makan_siang', 'Makan Siang', '#22c55e') +
    statCard('makan_malam', 'Makan Malam', '#a855f7') +
    '</div>';

  var controlsHtml =
    '<div class="rk-controls">' +
      '<div class="rk-tabs" id="rkTabs">' +
        '<button class="rk-tab" data-meal="snack"       onclick="setRekapMeal(\'snack\')">Snack<small>' + c.snack + '/' + total + '</small></button>' +
        '<button class="rk-tab" data-meal="makan_siang" onclick="setRekapMeal(\'makan_siang\')">Makan Siang<small>' + c.makan_siang + '/' + total + '</small></button>' +
        '<button class="rk-tab" data-meal="makan_malam" onclick="setRekapMeal(\'makan_malam\')">Makan Malam<small>' + c.makan_malam + '/' + total + '</small></button>' +
      '</div>' +
      '<div class="rk-row2">' +
        '<input class="rk-search" id="rkSearch" placeholder="Cari nama / departemen…" oninput="onRekapSearch(this.value)">' +
        '<div class="rk-chips" id="rkChips">' +
          '<button class="rk-chip" data-f="all" onclick="setRekapFilter(\'all\')">Semua</button>' +
          '<button class="rk-chip" data-f="no"  onclick="setRekapFilter(\'no\')">Belum</button>' +
          '<button class="rk-chip" data-f="yes" onclick="setRekapFilter(\'yes\')">Sudah</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="rk-summary" id="rkSummary"></div>' +
    '<div class="rk-list" id="rkList"></div>';

  area.innerHTML = statsHtml + controlsHtml;
  renderRekapList();
}

function setRekapMeal(meal) { rekapMeal = meal; renderRekapList(); }
function setRekapFilter(f)  { rekapFilter = f; renderRekapList(); }
function onRekapSearch(v)   { rekapSearch = v; renderRekapList(); }

function renderRekapList() {
  var list = document.getElementById('rkList');
  var summary = document.getElementById('rkSummary');
  if (!list) return;
  var col = REKAP_COL[rekapMeal];

  // highlight tab & chips aktif
  document.querySelectorAll('#rkTabs .rk-tab').forEach(function(b){
    b.className = 'rk-tab' + (b.dataset.meal === rekapMeal ? ' active-' + rekapMeal : '');
  });
  document.querySelectorAll('#rkChips .rk-chip').forEach(function(b){
    b.classList.toggle('active', b.dataset.f === rekapFilter);
  });
  // sync stat-card highlight
  document.querySelectorAll('.rekap-stat-card.rk-selectable').forEach(function(card){
    card.classList.toggle('rk-active', card.getAttribute('onclick').indexOf("'"+rekapMeal+"'") !== -1);
  });

  var q = rekapSearch.trim().toLowerCase();
  var done = 0, shown = 0, html = '';
  rekapRows.forEach(function(row) {
    var claimed = !!row.data[col];
    if (claimed) done++;
    if (rekapFilter === 'yes' && !claimed) return;
    if (rekapFilter === 'no'  &&  claimed) return;
    var nama = String(row.data[0]||''), dept = String(row.data[2]||''), pax = String(row.data[3]||'');
    if (q && (nama.toLowerCase().indexOf(q) === -1 && dept.toLowerCase().indexOf(q) === -1)) return;
    shown++;
    html += '<div class="rk-item ' + (claimed?'done':'undone') + '">' +
      '<div class="rk-item-main">' +
        '<div class="rk-item-name">' + esc(nama) + '</div>' +
        '<div class="rk-item-sub">' + esc(dept || '-') + (pax ? ' · ' + esc(pax) + ' pax' : '') + '</div>' +
      '</div>' +
      '<div class="rk-item-st">' +
        (claimed
          ? '<span class="rk-st-badge yes">' + svgIcon('check-circle','.75rem') + ' Sudah</span>' +
            '<div class="rk-st-time">' + formatClaimTime(row.data[col]) + '</div>'
          : '<span class="rk-st-badge no">' + svgIcon('x-circle','.75rem') + ' Belum</span>') +
      '</div>' +
    '</div>';
  });

  var total = rekapRows.length;
  if (summary) {
    summary.innerHTML = REKAP_LABEL[rekapMeal] + ': <strong>' + done + '</strong> sudah · <strong>' +
      (total - done) + '</strong> belum (dari ' + total + ' peserta)';
  }
  list.innerHTML = shown ? html : '<div class="rk-empty">Tidak ada peserta yang cocok.</div>';
}

function formatClaimTime(ts) {
  var s = String(ts == null ? '' : ts).trim();
  if (!s) return '-';
  var hari  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  var bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli',
               'Agustus','September','Oktober','November','Desember'];
  var d;
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[ T]+(\d{1,2}):(\d{2})/);
  if (m) { d = new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]); }
  else   { d = new Date(s); }
  if (isNaN(d.getTime())) return esc(s);
  var hh = ('0'+d.getHours()).slice(-2), mm = ('0'+d.getMinutes()).slice(-2);
  return hari[d.getDay()] + ', ' + d.getDate() + ' ' + bulan[d.getMonth()] +
    ' ' + d.getFullYear() + ', ' + hh + ':' + mm + ' WIB';
}

// ── Cache daftar peserta (verifikasi scan instan, tanpa round-trip backend) ──
var admClaimList = [];
var admClaimListLoaded = false;
var admClaimField = { snack:'snack_claim', makan_siang:'makan_siang_claim', makan_malam:'makan_malam_claim' };

function loadAdmClaimList() {
  fetch(WEB_APP_URL + '?type=claimList', { redirect:'follow' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.data) {
        admClaimList = d.data;
        admClaimListLoaded = true;
        var st = document.getElementById('claimScanStatus');
        if (st && st.textContent.indexOf('Memuat') !== -1) st.textContent = 'Siap. Pilih cara scan.';
      }
    })
    .catch(function() {});
}

function findAdmPerson(nama, inisial) {
  var n = String(nama||'').trim().toLowerCase();
  var i = String(inisial||'').trim().toLowerCase();
  for (var k = 0; k < admClaimList.length; k++) {
    var p = admClaimList[k];
    if (String(p.nama||'').trim().toLowerCase() === n &&
        String(p.inisial||'').trim().toLowerCase() === i) return p;
  }
  return null;
}

function highlightMealBtn(meal) {
  claimActiveMeal = meal;
  document.querySelectorAll('.meal-btn').forEach(function(b) {
    b.className = 'meal-btn' + (b.dataset.meal === 'none' ? ' meal-btn-tutup' : '');
    if (b.dataset.meal === meal) b.classList.add('active-' + meal);
  });
}

function setActiveMeal(meal) {
  postGAS({ action:'claim_set_active', token, meal_type: meal })
    .then(function(r) {
      if (r.ok) { highlightMealBtn(meal); toast('Sesi aktif: ' + (MEAL_LABELS_ADMIN[meal]||meal), 'ok'); }
      else toast('Gagal: ' + (r.error||'?'), 'err');
    })
    .catch(function() { toast('Koneksi gagal', 'err'); });
}

function startClaimScan() {
  var video = document.getElementById('claimVideo');
  var status = document.getElementById('claimScanStatus');
  if (!video) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    if (status) status.textContent = 'Kamera tidak didukung di browser ini.';
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(function(stream) {
      claimScanStream = stream;
      claimLastScanned = null;
      claimLastScanTime = 0;
      video.srcObject = stream;
      video.style.display = 'block';
      if (status) status.textContent = 'Arahkan kamera ke QR Code peserta…';
      video.play();
      claimScanAF = requestAnimationFrame(scanClaimFrame);
    })
    .catch(function(err) {
      if (status) status.textContent = 'Gagal akses kamera: ' + err.message;
    });
}

function stopClaimScan() {
  if (claimScanAF) { cancelAnimationFrame(claimScanAF); claimScanAF = null; }
  if (claimScanStream) {
    claimScanStream.getTracks().forEach(function(t) { t.stop(); });
    claimScanStream = null;
  }
  var video = document.getElementById('claimVideo');
  if (video) { video.style.display = 'none'; video.srcObject = null; }
  var status = document.getElementById('claimScanStatus');
  if (status) status.textContent = 'Kamera berhenti.';
}

function scanClaimFrame() {
  // Berhenti hanya jika stream sudah ditutup (tombol Stop)
  if (!claimScanStream) { claimScanAF = null; return; }

  var video = document.getElementById('claimVideo');
  if (video && video.readyState === video.HAVE_ENOUGH_DATA && window.jsQR) {
    claimScanCanvas.width  = video.videoWidth;
    claimScanCanvas.height = video.videoHeight;
    claimScanCtx.drawImage(video, 0, 0, claimScanCanvas.width, claimScanCanvas.height);
    var imgData = claimScanCtx.getImageData(0, 0, claimScanCanvas.width, claimScanCanvas.height);
    var code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts:'attemptBoth' });
    if (code && code.data) {
      var raw = code.data.trim();
      var now = Date.now();
      // QR baru → langsung proses. QR sama → boleh ulang setelah jeda CLAIM_RESCAN_MS.
      if (raw !== claimLastScanned || (now - claimLastScanTime) > CLAIM_RESCAN_MS) {
        claimLastScanned = raw;
        claimLastScanTime = now;
        (scanHandler || processScannedQR)(raw);
      }
    }
  }
  // Selalu lanjut memindai (kamera tetap terbuka) — continuous scanner
  claimScanAF = requestAnimationFrame(scanClaimFrame);
}

function manualClaimCheck() {
  var val = (document.getElementById('claimManualInput')?.value || '').trim();
  if (!val) return;
  processScannedQR(val);
}

function openPhotoInput() {
  var el = document.getElementById('claimPhotoInput');
  if (el) el.click();
}

// Scan QR dari foto (kamera HP via input file) — bekerja di iframe Apps Script
function scanPhotoQR(input) {
  var status = document.getElementById('claimScanStatus');
  var file = input && input.files && input.files[0];
  if (!file) return;
  if (!window.jsQR) { if (status) status.textContent = 'Pustaka QR belum termuat. Coba lagi.'; return; }
  if (status) status.textContent = 'Membaca QR dari foto…';
  var img = new Image();
  img.onload = function() {
    var MAX = 1000;
    var scale = Math.min(1, MAX / Math.max(img.width, img.height));
    var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
    claimScanCanvas.width = w; claimScanCanvas.height = h;
    claimScanCtx.drawImage(img, 0, 0, w, h);
    var imgData = claimScanCtx.getImageData(0, 0, w, h);
    var code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts:'attemptBoth' });
    URL.revokeObjectURL(img.src);
    input.value = '';
    if (code && code.data) {
      (scanHandler || processScannedQR)(code.data.trim());
    } else {
      if (status) status.textContent = '⚠ QR tidak terbaca dari foto. Coba foto lebih dekat & terang.';
    }
  };
  img.onerror = function() { if (status) status.textContent = 'Gagal memuat foto.'; input.value=''; };
  img.src = URL.createObjectURL(file);
}

function processScannedQR(raw) {
  // Format: IKCADIN2026|Nama Lengkap|INI
  var parts = raw.split('|');
  var status = document.getElementById('claimScanStatus');
  if (parts.length < 3 || parts[0] !== 'IKCADIN2026') {
    if (status) status.textContent = '⚠ QR tidak valid: ' + raw;
    return;
  }
  var nama    = parts[1].trim();
  var inisial = parts[2].trim();

  if (!claimActiveMeal || claimActiveMeal === 'none') {
    showClaimResult({ ok:false, error:'Tidak ada sesi aktif. Set sesi terlebih dahulu.' });
    return;
  }

  // ── Verifikasi INSTAN dari cache lokal (tanpa round-trip backend) ──
  if (admClaimListLoaded) {
    var person = findAdmPerson(nama, inisial);
    if (!person) {
      showClaimResult({ ok:false, error:'Peserta tidak ditemukan / inisial salah.' });
      return;
    }
    var claimedAt = String(person[admClaimField[claimActiveMeal]] || '').trim();
    if (status) status.textContent = 'QR terbaca.';
    showClaimResult({
      ok:true, nama:person.nama, dept:person.dept, pax:person.pax,
      already_claimed: !!claimedAt, claimed_at: claimedAt
    }, person.nama, person.inisial);
    return;
  }

  // Fallback: cache belum termuat → pakai backend
  if (status) status.textContent = 'QR terbaca — memverifikasi…';
  showClaimLoading(nama);
  postGAS({ action:'claim_scan', token, nama, inisial, meal_type: claimActiveMeal })
    .then(function(r) { showClaimResult(r, nama, inisial); })
    .catch(function() { showClaimResult({ ok:false, error:'Koneksi gagal' }); });
}

function showClaimLoading(nama) {
  var box = document.getElementById('claimResultBox');
  if (!box) return;
  box.className = 'claim-result-box show';
  box.innerHTML =
    '<div class="claim-loading">' +
      '<div class="claim-spinner"></div>' +
      '<div class="claim-loading-txt">Memverifikasi data' +
        (nama ? ' <strong>' + esc(nama) + '</strong>' : '') + '…</div>' +
    '</div>';
  try { box.scrollIntoView({ behavior:'smooth', block:'nearest' }); } catch(e) {}
}

function showClaimResult(r, nama, inisial) {
  var box = document.getElementById('claimResultBox');
  if (!box) return;
  box.className = 'claim-result-box show';

  var status = document.getElementById('claimScanStatus');
  if (status) status.textContent = r.ok ? 'QR terbaca.' : 'QR error.';

  if (!r.ok) {
    box.innerHTML = '<div class="cres-status-already">' + svgIcon('x-circle','1rem') + ' ' + esc(r.error||'Gagal') + '</div>' +
      '<button class="btn-scan-again" onclick="resetClaimResult()">Scan ulang</button>';
    try { box.scrollIntoView({ behavior:'smooth', block:'nearest' }); } catch(e) {}
    return;
  }

  // Rebuild skeleton (loading state sebelumnya menimpa isi box)
  var statusHtml, btnHtml;
  if (r.already_claimed) {
    statusHtml = '<div class="cres-status-already">' + svgIcon('x-circle','1rem') +
      ' Sudah claim pada: <strong>' + formatClaimTime(r.claimed_at) + '</strong></div>';
    btnHtml = '';
  } else {
    statusHtml = '<div class="cres-status-ok">' + svgIcon('check-circle','1rem') +
      ' Belum claim. Siap dikonfirmasi.</div>';
    btnHtml = '<button class="btn-claim-confirm" id="btnClaimConfirm" onclick="confirmClaimAdmin()" ' +
      'data-nama="' + esc(nama || r.nama) + '" data-inisial="' + esc(inisial || '') + '">' +
      svgIcon('check-circle','1rem') + ' Konfirmasi Claim ' + (MEAL_LABELS_ADMIN[claimActiveMeal]||'') + '</button>';
  }

  box.innerHTML =
    '<div class="cres-head">' +
      '<div class="cres-id">' +
        '<div class="cres-name">' + esc(r.nama) + '</div>' +
        '<div class="cres-dept">Department: ' + esc(r.dept || '-') + '</div>' +
      '</div>' +
      '<div class="cres-pax">' + r.pax + ' <span>PAX</span></div>' +
    '</div>' +
    '<div class="cres-meal">Sesi: ' + esc(MEAL_LABELS_ADMIN[claimActiveMeal] || claimActiveMeal) + '</div>' +
    '<div id="cresStatus">' + statusHtml + '</div>' +
    btnHtml +
    '<button class="btn-scan-again" onclick="resetClaimResult()">Scan ulang</button>';

  try { box.scrollIntoView({ behavior:'smooth', block:'nearest' }); } catch(e) {}
}

function confirmClaimAdmin() {
  var btn  = document.getElementById('btnClaimConfirm');
  var nama = btn.dataset.nama;
  var ini  = btn.dataset.inisial;
  if (!nama || !claimActiveMeal || claimActiveMeal === 'none') return;
  btn.disabled = true;
  btn.textContent = 'Menyimpan…';

  postGAS({ action:'claim_confirm', token, nama, inisial: ini, meal_type: claimActiveMeal })
    .then(function(r) {
      if (r.ok) {
        toast('✓ Claim berhasil — ' + r.nama + ' · ' + (MEAL_LABELS_ADMIN[claimActiveMeal]||''), 'ok');
        // Update cache lokal agar scan ulang langsung tampil "sudah claim"
        var p = findAdmPerson(nama, ini);
        if (p) p[admClaimField[claimActiveMeal]] = r.claimed_at || ' ';
        var statusDiv = document.getElementById('cresStatus');
        if (statusDiv) {
          statusDiv.innerHTML = '<div class="cres-status-ok">' + svgIcon('check-circle','1rem') +
            ' Claim dikonfirmasi: <strong>' + formatClaimTime(r.claimed_at) + '</strong></div>';
        }
        btn.style.display = 'none';
      } else if (!r.ok && r.error && r.error.includes('Sudah')) {
        // Backend menolak (panitia lain sudah claim) → sinkronkan cache
        var p2 = findAdmPerson(nama, ini);
        if (p2 && r.claimed_at) p2[admClaimField[claimActiveMeal]] = r.claimed_at;
        toast('Sudah pernah claim: ' + formatClaimTime(r.claimed_at), 'err');
        var sd = document.getElementById('cresStatus');
        if (sd) sd.innerHTML = '<div class="cres-status-already">' + svgIcon('x-circle','1rem') +
          ' Sudah claim pada: <strong>' + formatClaimTime(r.claimed_at) + '</strong></div>';
        btn.style.display = 'none';
      } else {
        toast('Error: ' + (r.error||'?'), 'err');
        btn.disabled = false;
        btn.innerHTML = svgIcon('check-circle','1rem') + ' Konfirmasi Claim';
      }
    })
    .catch(function() { toast('Koneksi gagal', 'err'); btn.disabled = false; });
}

function resetClaimResult() {
  claimLastScanned = null;
  var box = document.getElementById('claimResultBox');
  if (box) {
    box.className = 'claim-result-box';
    box.innerHTML = `
      <div class="cres-name"  id="cresName"></div>
      <div class="cres-dept"  id="cresDept"></div>
      <div class="cres-pax"   id="cresPax"></div>
      <div class="cres-meal"  id="cresMeal"></div>
      <div id="cresStatus"></div>
      <button class="btn-claim-confirm" id="btnClaimConfirm" onclick="confirmClaimAdmin()">
        ${svgIcon('check-circle','1rem')} Konfirmasi Claim
      </button>
      <button class="btn-scan-again" onclick="resetClaimResult()">Scan ulang</button>`;
  }
  var status = document.getElementById('claimScanStatus');
  if (status) status.textContent = 'Siap scan berikutnya.';
  var manualInput = document.getElementById('claimManualInput');
  if (manualInput) manualInput.value = '';
}

// ══════════════════════════════════════════════════════════════════
// VERIFIKASI KUNCI KAMAR (admin)
// ══════════════════════════════════════════════════════════════════
function renderKeyPanel() {
  return `
<div class="claim-panel">
  <div class="claim-panel-title">${svgIcon('home','1.1rem')} Verifikasi Kunci Kamar</div>

  <div class="claim-scanner-box">
    <div class="claim-scanner-label">${svgIcon('camera','0.9rem')} Scan QR PIC Kamar</div>
    <video id="claimVideo" autoplay playsinline muted></video>
    <div class="claim-scan-status" id="claimScanStatus">Pilih cara scan di bawah.</div>

    <input type="file" id="claimPhotoInput" accept="image/*" capture="environment"
      style="display:none" onchange="scanPhotoQR(this)">
    ${(function(){
      var inIframe = false; try { inIframe = (window.self !== window.top); } catch(e) { inIframe = true; }
      var liveStyle  = inIframe ? ' style="background:var(--card3,#142550)"' : '';
      var photoStyle = inIframe ? '' : ' style="background:var(--card3,#142550)"';
      var btns =
        '<button class="btn-scan-start"' + liveStyle + ' onclick="startClaimScan()">' + svgIcon('camera','0.9rem') + ' Kamera Live</button>' +
        '<button class="btn-scan-start"' + photoStyle + ' onclick="openPhotoInput()">Foto QR</button>' +
        '<button class="btn-scan-stop" onclick="stopClaimScan()">Stop</button>';
      var note = inIframe
        ? '<div style="margin-top:8px;font-size:.68rem;color:var(--muted);line-height:1.4">Mode Apps Script: "Kamera Live" sering diblokir. Pakai <strong>Foto QR</strong> — lebih stabil.</div>'
        : '';
      return '<div class="claim-scan-btns">' + btns + '</div>' + note;
    })()}

    <div style="margin-top:12px;font-size:.7rem;color:var(--muted)">— atau input manual —</div>
    <div class="claim-manual-row">
      <input class="claim-manual-input" id="keyManualInput"
        placeholder="Ketik nama PIC kamar"
        onkeydown="if(event.key==='Enter')onKeyManual()">
      <button class="btn-manual-check" onclick="onKeyManual()">Cek</button>
    </div>
  </div>

  <div class="claim-result-box" id="keyResultBox"></div>
</div>`;
}

function onKeyManual() {
  var val = (document.getElementById('keyManualInput')?.value || '').trim();
  if (!val) return;
  // input manual: "Nama" atau "Nama|Inisial" atau format QR penuh
  var parts = val.split('|');
  if (parts[0] === 'IKCADIN2026') { processKeyQR(val); return; }
  // tanpa inisial → minta lewat prompt sederhana
  var nama = parts[0].trim();
  var ini  = (parts[1] || '').trim();
  if (!ini) { ini = (prompt('Inisial PIC ' + nama + ':') || '').trim(); }
  if (!ini) return;
  runKeyScan(nama, ini);
}

function processKeyQR(raw) {
  // Format: IKCADIN2026|KEY|Nama|Inisial  (toleran juga IKCADIN2026|Nama|Inisial)
  var parts = raw.split('|');
  var status = document.getElementById('claimScanStatus');
  if (parts[0] !== 'IKCADIN2026' || parts.length < 3) {
    if (status) status.textContent = '⚠ QR tidak valid: ' + raw;
    return;
  }
  var nama, ini;
  if (String(parts[1]).toUpperCase() === 'KEY') { nama = (parts[2]||'').trim(); ini = (parts[3]||'').trim(); }
  else { nama = (parts[1]||'').trim(); ini = (parts[2]||'').trim(); }
  runKeyScan(nama, ini);
}

function runKeyScan(nama, ini) {
  var status = document.getElementById('claimScanStatus');
  if (status) status.textContent = 'QR terbaca — memverifikasi…';
  showKeyAdminLoading(nama);
  postGAS({ action:'key_scan', token, nama:nama, inisial:ini })
    .then(function(r){ r._ini = ini; showKeyAdminResult(r, nama, ini); })
    .catch(function(){ showKeyAdminResult({ ok:false, error:'Koneksi gagal' }); });
}

function showKeyAdminLoading(nama) {
  var box = document.getElementById('keyResultBox');
  if (!box) return;
  box.className = 'claim-result-box show';
  box.innerHTML = '<div class="claim-loading"><div class="claim-spinner"></div>' +
    '<div class="claim-loading-txt">Memverifikasi ' + (nama?'<strong>'+esc(nama)+'</strong>':'') + '…</div></div>';
  try { box.scrollIntoView({ behavior:'smooth', block:'nearest' }); } catch(e){}
}

function showKeyAdminResult(r, nama, ini) {
  var box = document.getElementById('keyResultBox');
  if (!box) return;
  box.className = 'claim-result-box show';
  var status = document.getElementById('claimScanStatus');
  if (status) status.textContent = r.ok ? 'QR terbaca.' : 'QR error.';

  if (!r.ok) {
    box.innerHTML = '<div class="cres-status-already">' + svgIcon('x-circle','1rem') + ' ' + esc(r.error||'Gagal') + '</div>' +
      '<button class="btn-scan-again" onclick="resetKeyResult()">Scan ulang</button>';
    return;
  }

  var rooms = r.rooms || [];
  var anyWaiting = rooms.some(function(rm){ return !rm.claimed_at; });
  var roomsHtml = rooms.map(function(rm){
    var taken = !!rm.claimed_at;
    var occ = (rm.occupants||[]).map(function(o){
      return '<div class="key-occ"><span class="key-occ-kode">' + esc(o.kode||'-') + '</span>' + esc(o.name) + '</div>';
    }).join('');
    return '<div class="key-room-card">' +
      '<div class="key-room-head"><div class="key-room-num">' + svgIcon('home','17px') + ' Kamar ' + esc(String(rm.room)) + '</div>' +
        (rm.type?'<div class="key-room-type">' + esc(rm.type) + '</div>':'') + '</div>' +
      '<div class="key-occ-title">Penghuni</div><div class="key-occ-list">' + occ + '</div>' +
      '<div class="key-room-status ' + (taken?'taken':'waiting') + '">' + svgIcon(taken?'check-circle':'x-circle','14px') + ' ' +
        (taken ? 'Sudah diserahkan · ' + formatClaimTime(rm.claimed_at) : 'Belum diserahkan') + '</div>' +
    '</div>';
  }).join('');

  var btn = anyWaiting
    ? '<button class="btn-claim-confirm" id="btnKeyConfirm" onclick="confirmKeyAdmin()" data-nama="' + esc(nama||r.nama) + '" data-ini="' + esc(ini||r._ini||'') + '">' +
        svgIcon('key','1rem') + ' Serahkan Kunci (' + rooms.length + ' kamar)</button>'
    : '<div class="cres-status-ok">' + svgIcon('check-circle','1rem') + ' Semua kunci sudah diserahkan</div>';

  box.innerHTML =
    '<div class="key-pic-head">' + esc(r.nama) + '</div>' +
    '<div class="key-pic-sub">PIC Kamar · ' + rooms.length + ' kamar</div>' +
    roomsHtml + btn +
    '<button class="btn-scan-again" onclick="resetKeyResult()">Scan ulang</button>';
  try { box.scrollIntoView({ behavior:'smooth', block:'nearest' }); } catch(e){}
}

function confirmKeyAdmin() {
  var btn = document.getElementById('btnKeyConfirm');
  if (!btn) return;
  var nama = btn.dataset.nama, ini = btn.dataset.ini;
  btn.disabled = true; btn.textContent = 'Menyimpan…';
  postGAS({ action:'key_confirm', token, nama:nama, inisial:ini })
    .then(function(r){
      if (r.ok) {
        toast('✓ Kunci diserahkan — ' + r.nama, 'ok');
        runKeyScan(nama, ini); // refresh tampilan status
      } else {
        toast('Gagal: ' + (r.error||'?'), 'err');
        btn.disabled = false; btn.innerHTML = svgIcon('key','1rem') + ' Serahkan Kunci';
      }
    })
    .catch(function(){ toast('Koneksi gagal', 'err'); btn.disabled = false; });
}

function resetKeyResult() {
  claimLastScanned = null;
  var box = document.getElementById('keyResultBox');
  if (box) { box.className = 'claim-result-box'; box.innerHTML = ''; }
  var status = document.getElementById('claimScanStatus');
  if (status) status.textContent = 'Siap scan berikutnya.';
  var mi = document.getElementById('keyManualInput');
  if (mi) mi.value = '';
}
</script>
