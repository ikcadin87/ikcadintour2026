      const imgUrl = (m.foto && m.foto.trim()) ? m.foto.trim() : getInitialsAvatar(m.nama);
      const waHtml = m.hp
        ? `<a class="pnt-wa" href="https://wa.me/62${m.hp.replace(/^0/,'').replace(/\D/g,'')}" target="_blank">${ICO_CHAT} Chat</a>`
        : '';
      // Jika grup ALL ACCESS, koordinator juga dapat badge All Access
      const aaBadge = isAllAccessGroup
        ? `<span class="pnt-badge aa-tag" style="margin-left:4px">${ICO_BOLT} All Access</span>`
        : '';
      // Keterangan hanya tampil jika beda dengan role
      const ketVal = m.keterangan || '';
      const ketHtml = (ketVal && ketVal !== m.role) ? `<div class="pnt-ket">${escHtml(ketVal)}</div>` : '';
      html += `
      <div class="pnt-card lead-box${isAllAccessGroup ? ' all-access-box' : ''}">
        <div class="pnt-avatar-wrap">
          <img class="pnt-avatar" src="${imgUrl}" alt="${escHtml(m.nama)}" loading="lazy">
        </div>
        <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:7px">
          <span class="pnt-badge coord" style="margin-bottom:0">${ICO_CROWN} ${escHtml(m.role || 'Koordinator')}</span>
          ${aaBadge}
        </div>
        <div class="pnt-nama">${escHtml(m.nama)}</div>
        ${ketHtml}
        ${waHtml}
      </div>`;
    });

    // 2. Anggota divisi
    g.anggota.forEach(m => {
      const imgUrl = (m.foto && m.foto.trim()) ? m.foto.trim() : getInitialsAvatar(m.nama);
      const cardClass = isAllAccessGroup ? "pnt-card all-access-box" : "pnt-card";
      const badgeHtml = isAllAccessGroup
        ? `<span class="pnt-badge aa-tag">${ICO_BOLT} All Access</span>`
        : '';
      const waHtml = m.hp
        ? `<a class="pnt-wa" href="https://wa.me/62${m.hp.replace(/^0/,'').replace(/\D/g,'')}" target="_blank">${ICO_CHAT} Chat</a>`
        : '';
      // Tampilkan role hanya jika ada; tampilkan keterangan hanya jika beda dengan role
      const roleText = m.role ? `<div class="pnt-role">${escHtml(m.role)}</div>` : '';
      const ketVal   = m.keterangan || (isAllAccessGroup ? '' : '');
      const ketHtml  = (ketVal && ketVal !== m.role) ? `<div class="pnt-ket">${escHtml(ketVal)}</div>` : '';
      html += `
      <div class="${cardClass}">
        <div class="pnt-avatar-wrap">
          <img class="pnt-avatar" src="${imgUrl}" alt="${escHtml(m.nama)}" loading="lazy">
        </div>
        ${badgeHtml}
        <div class="pnt-nama">${escHtml(m.nama)}</div>
        ${roleText}
        ${ketHtml}
        ${waHtml}
      </div>`;
    });

    html += `</div>`;
  });
  return html;
}



// ── DRAWER ─────────────────────────────────────────────────────
function toggleDrawer() {
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  const btn     = document.getElementById('hamburger');
  if (drawer.classList.contains('open')) { closeDrawer(); return; }
  drawer.classList.add('open');
  overlay.classList.add('open');
  if (btn) btn.classList.add('open');
  // Cegah scroll background — cukup lock overflow di html saja
  document.documentElement.style.overflowY = 'hidden';
}
function closeDrawer() {
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  const btn     = document.getElementById('hamburger');
  if (drawer)  drawer.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
  if (btn)     btn.classList.remove('open');
  document.documentElement.style.overflowY = '';
}

// ── COUNTDOWN ──────────────────────────────────────────────────
function initCountdown(dateStr) {
  let target;
  try { target = new Date(dateStr); if (isNaN(target.getTime())) return; } catch(e) { return; }
  const container = document.getElementById('heroCountdown');
  if (!container) return;
  function pad(n) { return String(n).padStart(2,'0'); }
  function update() {
    const diff = target - new Date();
    if (diff <= 0) {
      container.innerHTML = '<div class="countdown-done">&#127881; Event sedang berlangsung!</div>';
      return;
    }
    const d = Math.floor(diff / 864e5);
    const h = Math.floor((diff % 864e5) / 36e5);
    const m = Math.floor((diff % 36e5) / 6e4);
    const s = Math.floor((diff % 6e4) / 1e3);
    container.innerHTML =
      `<div class="countdown-item"><span class="countdown-num">${pad(d)}</span><span class="countdown-label">Hari</span></div>` +
      `<div class="countdown-item"><span class="countdown-num">${pad(h)}</span><span class="countdown-label">Jam</span></div>` +
      `<div class="countdown-item"><span class="countdown-num">${pad(m)}</span><span class="countdown-label">Menit</span></div>` +
      `<div class="countdown-item"><span class="countdown-num">${pad(s)}</span><span class="countdown-label">Detik</span></div>`;
  }
  update();
  setInterval(update, 1000);
}

// ══════════════════════════════════════════════════════════════════
// CLAIM SYSTEM
// ══════════════════════════════════════════════════════════════════

var claimList       = [];       // [{nama, dept}]
var claimSelected   = null;     // {nama, dept}
var claimVerified   = null;     // verified person from GAS
var claimListLoaded = false;
var claimPollTimer  = null;     // interval untuk realtime polling

const MEAL_LABELS = {
  snack:       'Snack',
  makan_siang: 'Makan Siang',
  makan_malam: 'Makan Malam',
  none:        'Tidak Ada Sesi Aktif'
};

function renderClaim() {
  return `
<div class="claim-wrap">
  <div id="claimStep1">
    <div id="claimActiveBadge" class="claim-active-badge active-none">
      ${svgIcon('ticket','14px')} Memuat status sesi…
    </div>
    <div class="claim-search-wrap">
      <input type="text" id="claimSearchInput" class="claim-search"
        placeholder="Ketik nama kamu…"
        oninput="filterClaimSearch(this.value)"
        autocomplete="off" spellcheck="false">
      <div class="claim-dropdown" id="claimDropdown"></div>
    </div>
  </div>

  <!-- Modal inisial — bottom sheet -->
  <div class="claim-modal-overlay" id="claimModal" style="display:none" onclick="if(event.target===this)closeClaimModal()">
    <div class="claim-modal">
      <div class="claim-modal-handle"></div>
      <div class="claim-modal-title">Verifikasi Identitas</div>
      <div class="claim-modal-name" id="claimModalName"></div>
      <input type="text" id="claimInitialInput" class="claim-initial-input"
        maxlength="3" placeholder="···"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"
        onkeydown="if(event.key==='Enter')submitClaimVerify()">
      <div class="claim-modal-hint">Ketik 3 huruf inisial nama kamu</div>
      <div class="claim-modal-error" id="claimModalError"></div>
      <div class="claim-modal-btns">
        <button class="claim-btn-cancel" onclick="closeClaimModal()">Batal</button>
        <button class="claim-btn-ok" id="claimVerifyBtn" onclick="submitClaimVerify()">Verifikasi</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="claim-result" id="claimResult" style="display:none">
    <div class="claim-qr-wrap" id="claimQrWrap"></div>
    <div class="claim-info-card" id="claimInfoCard"></div>
    <button class="claim-reset-btn" onclick="resetClaim()">↩ Cari nama lain</button>
  </div>
</div>`;
}

function initClaimSection() {
  if (!claimListLoaded) loadClaimList();
  else refreshClaimBadge();
}

function loadClaimList() {
  fetch(WEB_APP_URL + '?type=claimList', { redirect:'follow' })
    .then(r => r.json())
    .then(d => {
      claimList = d.data || [];
      claimListLoaded = true;
      updateClaimBadge(d.active_meal || 'none');
    })
    .catch(() => updateClaimBadge('none'));
}

function refreshClaimBadge() {
  fetch(WEB_APP_URL + '?type=claimList', { redirect:'follow' })
    .then(r => r.json())
    .then(d => updateClaimBadge(d.active_meal || 'none'))
    .catch(() => {});
}

function updateClaimBadge(meal) {
  var badge = document.getElementById('claimActiveBadge');
  if (!badge) return;
  var cls = 'active-' + meal;
  badge.className = 'claim-active-badge ' + cls;
  var icon = meal === 'none' ? 'x-circle' : 'check-circle';
  badge.innerHTML = svgIcon(icon,'14px') + ' ' +
    (meal === 'none' ? 'Tidak ada sesi claim aktif saat ini' :
     'Sesi aktif: <strong style="margin-left:4px">' + (MEAL_LABELS[meal]||meal) + '</strong>');
}

function filterClaimSearch(val) {
  var dd = document.getElementById('claimDropdown');
  if (!dd) return;
  var q = val.trim().toLowerCase();
  if (!q) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
  var matches = claimList.filter(function(p) {
    return p.nama.toLowerCase().includes(q) || (p.dept||'').toLowerCase().includes(q);
  }).slice(0, 20);
  if (!matches.length) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
  dd.innerHTML = matches.map(function(p) {
    return '<div class="claim-drop-item" onclick="selectClaimPerson(\'' +
      escHtml(p.nama).replace(/'/g,"\\x27") + '\',\'' +
      escHtml(p.dept||'').replace(/'/g,"\\x27") + '\')">' +
      '<div class="claim-drop-nama">' + escHtml(p.nama) + '</div>' +
      '<div class="claim-drop-dept">' + escHtml(p.dept||'') + '</div>' +
      '</div>';
  }).join('');
  dd.classList.add('open');
}

function selectClaimPerson(nama, dept) {
  claimSelected = { nama: nama, dept: dept };
  var inp = document.getElementById('claimSearchInput');
  if (inp) inp.value = nama;
  // Open modal
  var modal = document.getElementById('claimModal');
  var modalName = document.getElementById('claimModalName');
  var initInp = document.getElementById('claimInitialInput');
  var errEl = document.getElementById('claimModalError');
  if (modalName) modalName.textContent = nama + (dept ? ' · ' + dept : '');
  if (initInp) { initInp.value = ''; initInp.focus(); }
  if (errEl) errEl.textContent = '';
  if (modal) modal.style.display = 'flex';
}

function closeClaimModal() {
  var modal = document.getElementById('claimModal');
  if (modal) modal.style.display = 'none';
  claimSelected = null;
}

function submitClaimVerify() {
  if (!claimSelected) return;
  var ini = (document.getElementById('claimInitialInput')?.value || '').trim().toUpperCase();
  var err = document.getElementById('claimModalError');
  var btn = document.getElementById('claimVerifyBtn');
  if (!ini || ini.length < 2) { if(err) err.textContent = 'Masukkan minimal 2 huruf inisial.'; return; }
  if (err) err.textContent = '';
  if (btn) { btn.disabled = true; btn.textContent = 'Memeriksa…'; }

  postClaim({ action:'claim_verify', nama: claimSelected.nama, inisial: ini })
    .then(function(r) {
      if (r.ok) {
        claimVerified = r;
        closeClaimModal();
        showClaimResult(r);
      } else {
        if (err) err.textContent = r.error || 'Inisial tidak cocok. Coba lagi.';
      }
    })
    .catch(function() { if(err) err.textContent = 'Gagal koneksi. Coba lagi.'; })
    .finally(function() { if(btn) { btn.disabled=false; btn.textContent='Verifikasi'; } });
}

function showClaimResult(r) {
  var step1    = document.getElementById('claimStep1');
  var result   = document.getElementById('claimResult');
  var qrWrap   = document.getElementById('claimQrWrap');
  var infoCard = document.getElementById('claimInfoCard');
  if (step1)  step1.style.display  = 'none';
  if (result) result.style.display = 'block';

  // Generate QR code
  if (qrWrap) {
    qrWrap.innerHTML = '';
    var qrDiv = document.createElement('div');
    qrWrap.appendChild(qrDiv);
    if (window.QRCode) {
      new QRCode(qrDiv, {
        text: 'IKCADIN2026|' + r.nama + '|' + (r.inisial || document.getElementById('claimInitialInput')?.value || ''),
        width: 200, height: 200,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } else {
      qrDiv.innerHTML = '<div style="font-size:.75rem;color:#999;padding:10px">QR tidak tersedia</div>';
    }
  }

  // Info card
  if (infoCard) {
    renderClaimInfoCard(r);
  }

  // Mulai polling realtime — cek apakah admin sudah konfirmasi
  var activeMeal = r.active_meal || 'none';
  if (activeMeal !== 'none') {
    var fieldMap = { snack:'snack_claim', makan_siang:'makan_siang_claim', makan_malam:'makan_malam_claim' };
    var field = fieldMap[activeMeal];
    if (!r[field]) {
      startClaimPoll(r.nama, r.inisial || (document.getElementById('claimInitialInput')?.value || ''), activeMeal, field);
    }
  }
}

function renderClaimInfoCard(r) {
  var infoCard = document.getElementById('claimInfoCard');
  if (!infoCard) return;
  var meals = [
    { key:'snack',       label:'Snack',      val: r.snack_claim },
    { key:'makan_siang', label:'Makan Siang', val: r.makan_siang_claim },
    { key:'makan_malam', label:'Makan Malam', val: r.makan_malam_claim },
  ];
  var rows = meals.map(function(m) {
    var claimed = !!m.val;
    return '<div class="claim-status-row">' +
      '<div><div class="claim-status-label">' + m.label + '</div>' +
      (claimed ? '<div class="claim-status-ts">' + escHtml(m.val) + '</div>' : '') +
      '</div>' +
      '<span class="claim-status-badge ' + (claimed ? 'claimed' : 'unclaimed') + '">' +
      svgIcon(claimed ? 'check-circle' : 'x-circle', '12px') +
      (claimed ? ' Sudah' : ' Belum') + '</span>' +
      '</div>';
  }).join('');
  infoCard.innerHTML =
    '<div class="claim-info-name">' + escHtml(r.nama) + '</div>' +
    '<div class="claim-info-dept">' + escHtml(r.dept||'') + '</div>' +
    '<div class="claim-info-pax">' + svgIcon('sparkles','13px') + ' ' + r.pax + ' Pax</div>' +
    '<div class="claim-status-grid">' + rows + '</div>';
}

// ── Realtime polling ──────────────────────────────────────────
function startClaimPoll(nama, inisial, mealType, field) {
  stopClaimPoll();
  // Tampilkan indikator menunggu
  var qrWrap = document.getElementById('claimQrWrap');
  if (qrWrap) {
    var indicator = document.createElement('div');
    indicator.id = 'claimPollIndicator';
    indicator.className = 'claim-poll-indicator';
    indicator.innerHTML = '<span class="claim-poll-dot"></span> Menunggu konfirmasi admin…';
    qrWrap.appendChild(indicator);
  }
  claimPollTimer = setInterval(function() {
    fetch(WEB_APP_URL + '?type=claimList', { redirect:'follow' })
      .then(function(res) { return res.json(); })
      .then(function(d) {
        var person = (d.data || []).find(function(p) {
          return p.nama.toLowerCase() === nama.toLowerCase();
        });
        if (!person) return;
        if (person[field]) {
          stopClaimPoll();
          showClaimConfirmed(nama, mealType, person[field]);
        }
      })
      .catch(function() {});
  }, 4000);
}

function stopClaimPoll() {
  if (claimPollTimer) { clearInterval(claimPollTimer); claimPollTimer = null; }
}

function showClaimConfirmed(nama, mealType, timestamp) {
  var result = document.getElementById('claimResult');
  if (!result) return;
  result.innerHTML =
    '<div class="claim-confirmed-box">' +
    '<div class="claim-confirmed-icon">' + svgIcon('check-circle', '3rem') + '</div>' +
    '<div class="claim-confirmed-title">Claim Berhasil!</div>' +
    '<div class="claim-confirmed-sub">' + escHtml(nama) + ' · ' + (MEAL_LABELS[mealType]||mealType) + '<br><small>' + timestamp + '</small></div>' +
    '<button class="claim-reset-btn" onclick="resetClaim()" style="margin-top:16px">↩ Kembali</button>' +
    '</div>';
}

function resetClaim() {
  stopClaimPoll();
  claimSelected = null;
  claimVerified = null;
  var step1  = document.getElementById('claimStep1');
  var result = document.getElementById('claimResult');
  var inp    = document.getElementById('claimSearchInput');
  if (step1) step1.style.display = 'flex';
  if (result) result.style.display = 'none';
  if (inp) { inp.value = ''; inp.focus(); }
  var dd = document.getElementById('claimDropdown');
  if (dd) { dd.classList.remove('open'); dd.innerHTML = ''; }
  refreshClaimBadge();
}

function postClaim(payload) {
  return fetch(WEB_APP_URL, {
    method: 'POST', redirect:'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); });
}

// Tutup dropdown saat klik di luar
document.addEventListener('click', function(e) {
  var dd   = document.getElementById('claimDropdown');
  var wrap = document.querySelector('.claim-search-wrap');
  if (dd && wrap && !wrap.contains(e.target)) { dd.classList.remove('open'); }
});

// ── INITIALS AVATAR (pengganti DiceBear, tanpa request external) ─
function getInitialsAvatar(nama) {
  const colors = ['#1B3A8C','#2E4EAD','#0D6E6E','#7C5CFC','#9B3A3A','#2E7D32','#C47700'];
  const idx = (nama || 'X').charCodeAt(0) % colors.length;
  const inits = (nama || '?').trim().split(/\s+/).slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '?';
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">' +
    '<circle cx="36" cy="36" r="36" fill="' + colors[idx] + '"/>' +
    '<text x="36" y="36" dy=".35em" text-anchor="middle" fill="white" font-family="system-ui" font-size="26" font-weight="700">' + inits + '</text>' +
    '</svg>';
  try { return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))); }
  catch(e) { return 'data:image/svg+xml;base64,' + btoa(svg); }
}
